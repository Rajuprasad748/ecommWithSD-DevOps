name: Spring Boot CI

on:
  push:
    branches:
      - main
      - dev

  pull_request:
    branches:
      -main
      -dev

jobs:
  build:

    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory : Backend

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Verify Java Version
        run: java -version

      - name: Build Project
        run: mvn clean compile